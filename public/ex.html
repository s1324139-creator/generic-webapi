<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1週間献立プランナー</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #24312b;
            background: #f4f1ea;
            line-height: 1.6;
        }

        button,
        input,
        textarea {
            font: inherit;
        }

        button {
            cursor: pointer;
        }

        .app {
            width: min(1120px, 100%);
            margin: 0 auto;
            padding: 24px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            padding: 18px 0 24px;
        }

        .topbar h1 {
            font-size: clamp(1.5rem, 3vw, 2.2rem);
            line-height: 1.2;
            letter-spacing: 0;
        }

        .topbar a {
            color: #315f72;
            font-weight: 700;
            text-decoration: none;
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 390px) minmax(0, 1fr);
            gap: 20px;
            align-items: start;
        }

        .panel,
        .result-panel {
            background: #fffdf8;
            border: 1px solid #dfd6c8;
            border-radius: 8px;
            box-shadow: 0 10px 28px rgba(45, 36, 24, 0.08);
        }

        .panel {
            padding: 20px;
            position: sticky;
            top: 16px;
        }

        .result-panel {
            min-height: 580px;
            padding: 22px;
        }

        .form-section + .form-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ebe3d7;
        }

        label,
        .section-title {
            display: block;
            margin-bottom: 8px;
            color: #2d3b34;
            font-size: 0.95rem;
            font-weight: 800;
        }

        textarea,
        input {
            width: 100%;
            border: 1px solid #cfc5b7;
            border-radius: 8px;
            background: #ffffff;
            color: #24312b;
            padding: 11px 12px;
            outline: none;
        }

        textarea:focus,
        input:focus {
            border-color: #427a8d;
            box-shadow: 0 0 0 3px rgba(66, 122, 141, 0.18);
        }

        textarea {
            min-height: 126px;
            resize: vertical;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 92px;
            gap: 10px;
        }

        .inline-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 34px;
            margin-top: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            max-width: 100%;
            border: 1px solid #cfd7c8;
            border-radius: 999px;
            background: #eef5ea;
            color: #26372d;
            padding: 5px 9px 5px 11px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .chip button {
            width: 22px;
            height: 22px;
            border: 0;
            border-radius: 50%;
            background: #d8e5d1;
            color: #26372d;
            font-weight: 900;
            line-height: 1;
        }

        .empty {
            color: #7b7166;
            font-size: 0.93rem;
        }

        .btn {
            min-height: 44px;
            border: 0;
            border-radius: 8px;
            background: #2f6f62;
            color: #ffffff;
            padding: 10px 16px;
            font-weight: 800;
        }

        .btn.secondary {
            background: #315f72;
        }

        .btn.ghost {
            border: 1px solid #bfb5a7;
            background: #fffdf8;
            color: #315f72;
        }

        .btn:disabled {
            cursor: wait;
            opacity: 0.65;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .actions .btn {
            flex: 1;
        }

        .status {
            min-height: 24px;
            margin-top: 12px;
            color: #7b3f2e;
            font-weight: 700;
        }

        .placeholder {
            display: grid;
            place-items: center;
            min-height: 520px;
            color: #746a5f;
            text-align: center;
            border: 1px dashed #d4c9ba;
            border-radius: 8px;
            padding: 24px;
        }

        .summary {
            border-left: 5px solid #2f6f62;
            background: #eef5ea;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 18px;
            color: #26372d;
            font-weight: 700;
        }

        .day-grid {
            display: grid;
            gap: 14px;
        }

        .day {
            border: 1px solid #dfd6c8;
            border-radius: 8px;
            overflow: hidden;
            background: #ffffff;
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            background: #f7f0e4;
            padding: 12px 14px;
            color: #2d3b34;
        }

        .day-header strong {
            white-space: nowrap;
        }

        .meal-list {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1px;
            background: #e7ded0;
        }

        .meal {
            background: #ffffff;
            padding: 14px;
        }

        .meal h3 {
            margin-bottom: 8px;
            color: #315f72;
            font-size: 1rem;
        }

        .meal-name {
            margin-bottom: 8px;
            color: #24312b;
            font-weight: 800;
        }

        .meta {
            color: #675d52;
            font-size: 0.9rem;
        }

        .small-list {
            margin: 8px 0 0 18px;
            color: #3a463f;
            font-size: 0.92rem;
        }

        .result-section {
            margin-top: 22px;
        }

        .result-section h2 {
            margin-bottom: 12px;
            color: #24312b;
            font-size: 1.25rem;
        }

        .shopping-grid,
        .save-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 12px;
        }

        .mini-card {
            border: 1px solid #dfd6c8;
            border-radius: 8px;
            background: #ffffff;
            padding: 14px;
        }

        .mini-card h3 {
            margin-bottom: 8px;
            color: #315f72;
            font-size: 1rem;
        }

        .save-menu-btn {
            margin-top: 10px;
            min-height: 36px;
            width: 100%;
            border: 1px solid #2f6f62;
            border-radius: 8px;
            background: #eef5ea;
            color: #2f6f62;
            font-weight: 800;
        }

        @media (max-width: 860px) {
            .app {
                padding: 16px;
            }

            .layout,
            .meal-list,
            .inline-row {
                grid-template-columns: 1fr;
            }

            .panel {
                position: static;
            }
        }

        @media (max-width: 520px) {
            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .field-row {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <header class="topbar">
            <h1>1週間献立プランナー</h1>
            <a href="index.html">アプリ一覧</a>
        </header>

        <div class="layout">
            <form class="panel" id="mealForm">
                <section class="form-section">
                    <label for="ingredients">冷蔵庫の中身</label>
                    <textarea id="ingredients" placeholder="例: 卵、鶏肉、キャベツ、牛乳、豆腐、ごはん" required></textarea>
                </section>

                <section class="form-section">
                    <div class="section-title">嫌いな食べ物・避けたい食材</div>
                    <div class="field-row">
                        <input id="dislikedInput" type="text" placeholder="例: トマト">
                        <button class="btn ghost" type="button" id="addDislikedBtn">追加</button>
                    </div>
                    <div class="chips" id="dislikedChips"></div>
                </section>

                <section class="form-section">
                    <div class="section-title">保存メニュー</div>
                    <div class="field-row">
                        <input id="savedMenuInput" type="text" placeholder="例: 親子丼">
                        <button class="btn ghost" type="button" id="addSavedMenuBtn">追加</button>
                    </div>
                    <div class="chips" id="savedMenuChips"></div>
                </section>

                <section class="form-section">
                    <div class="inline-row">
                        <div>
                            <label for="servings">人数</label>
                            <input id="servings" type="text" value="2人分">
                        </div>
                        <div>
                            <label for="title">タイトル</label>
                            <input id="title" type="text" value="1週間の献立提案">
                        </div>
                    </div>
                </section>

                <section class="form-section">
                    <label for="preferences">希望条件・メモ</label>
                    <textarea id="preferences" placeholder="例: 平日は20分以内、夕食は翌日の昼にも使いたい"></textarea>
                </section>

                <div class="actions">
                    <button class="btn" type="submit" id="generateBtn">献立を作成</button>
                    <button class="btn secondary" type="button" id="clearBtn">入力をクリア</button>
                </div>
                <div class="status" id="status"></div>
            </form>

            <section class="result-panel" id="result">
                <div class="placeholder">ここに1週間の献立と買い物リストが表示されます。</div>
            </section>
        </div>
    </main>

    <script>
        const storageKeys = {
            disliked: 'mealPlanner.dislikedFoods',
            savedMenus: 'mealPlanner.savedMenus'
        };

        const state = {
            disliked: loadList(storageKeys.disliked),
            savedMenus: loadList(storageKeys.savedMenus)
        };

        const mealLabels = {
            breakfast: '朝食',
            lunch: '昼食',
            dinner: '夕食'
        };

        const elements = {
            form: document.getElementById('mealForm'),
            ingredients: document.getElementById('ingredients'),
            dislikedInput: document.getElementById('dislikedInput'),
            dislikedChips: document.getElementById('dislikedChips'),
            savedMenuInput: document.getElementById('savedMenuInput'),
            savedMenuChips: document.getElementById('savedMenuChips'),
            servings: document.getElementById('servings'),
            title: document.getElementById('title'),
            preferences: document.getElementById('preferences'),
            result: document.getElementById('result'),
            status: document.getElementById('status'),
            generateBtn: document.getElementById('generateBtn'),
            clearBtn: document.getElementById('clearBtn'),
            addDislikedBtn: document.getElementById('addDislikedBtn'),
            addSavedMenuBtn: document.getElementById('addSavedMenuBtn')
        };

        elements.addDislikedBtn.addEventListener('click', () => addItem('disliked'));
        elements.addSavedMenuBtn.addEventListener('click', () => addItem('savedMenus'));
        elements.dislikedInput.addEventListener('keydown', handleEnter('disliked'));
        elements.savedMenuInput.addEventListener('keydown', handleEnter('savedMenus'));
        elements.clearBtn.addEventListener('click', clearInputs);
        elements.form.addEventListener('submit', generatePlan);

        renderChips();

        function loadList(key) {
            try {
                const value = JSON.parse(localStorage.getItem(key));
                return Array.isArray(value) ? value : [];
            } catch (error) {
                return [];
            }
        }

        function saveList(key, list) {
            localStorage.setItem(key, JSON.stringify(list));
        }

        function handleEnter(type) {
            return (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    addItem(type);
                }
            };
        }

        function addItem(type, value) {
            const input = type === 'disliked' ? elements.dislikedInput : elements.savedMenuInput;
            const text = String(value || input.value).trim();
            if (!text || state[type].includes(text)) return;

            state[type].push(text);
            persist(type);
            input.value = '';
            renderChips();
        }

        function removeItem(type, index) {
            state[type].splice(index, 1);
            persist(type);
            renderChips();
        }

        function persist(type) {
            saveList(type === 'disliked' ? storageKeys.disliked : storageKeys.savedMenus, state[type]);
        }

        function renderChips() {
            renderChipList(elements.dislikedChips, state.disliked, 'disliked', '登録なし');
            renderChipList(elements.savedMenuChips, state.savedMenus, 'savedMenus', '保存なし');
        }

        function renderChipList(container, items, type, emptyText) {
            container.innerHTML = '';
            if (items.length === 0) {
                const empty = document.createElement('span');
                empty.className = 'empty';
                empty.textContent = emptyText;
                container.appendChild(empty);
                return;
            }

            items.forEach((item, index) => {
                const chip = document.createElement('span');
                chip.className = 'chip';
                chip.append(document.createTextNode(item));

                const button = document.createElement('button');
                button.type = 'button';
                button.textContent = 'x';
                button.setAttribute('aria-label', item + 'を削除');
                button.addEventListener('click', () => removeItem(type, index));

                chip.appendChild(button);
                container.appendChild(chip);
            });
        }

        function clearInputs() {
            elements.ingredients.value = '';
            elements.preferences.value = '';
            elements.status.textContent = '';
            elements.result.innerHTML = '<div class="placeholder">ここに1週間の献立と買い物リストが表示されます。</div>';
        }

        async function generatePlan(event) {
            event.preventDefault();

            const ingredients = elements.ingredients.value.trim();
            if (!ingredients) {
                elements.status.textContent = '冷蔵庫の中身を入力してください。';
                elements.ingredients.focus();
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: elements.title.value.trim() || '1週間の献立提案',
                        ingredients,
                        dislikedFoods: state.disliked.join('、'),
                        savedMenus: state.savedMenus.join('、'),
                        servings: elements.servings.value.trim() || '2人分',
                        preferences: elements.preferences.value.trim()
                    })
                });

                const payload = await response.json();
                if (!response.ok) {
                    throw new Error(payload.error || 'API error');
                }

                const plan = Array.isArray(payload.data) ? payload.data[0] : null;
                if (!plan) {
                    throw new Error('献立データを取得できませんでした。');
                }

                renderPlan(plan);
                elements.status.textContent = '作成しました。';
            } catch (error) {
                elements.status.textContent = '作成に失敗しました: ' + error.message;
            } finally {
                setLoading(false);
            }
        }

        function setLoading(isLoading) {
            elements.generateBtn.disabled = isLoading;
            elements.generateBtn.textContent = isLoading ? '作成中...' : '献立を作成';
            elements.status.textContent = isLoading ? 'AIが献立を作成しています。' : elements.status.textContent;
        }

        function renderPlan(plan) {
            elements.result.innerHTML = '';

            if (plan.summary) {
                const summary = document.createElement('div');
                summary.className = 'summary';
                summary.textContent = plan.summary;
                elements.result.appendChild(summary);
            }

            const days = document.createElement('div');
            days.className = 'day-grid';
            (plan.weeklyPlan || []).forEach((day) => days.appendChild(createDay(day)));
            elements.result.appendChild(days);

            elements.result.appendChild(createShoppingSection(plan.shoppingList || []));
            elements.result.appendChild(createRecommendedSection(plan.recommendedSavedMenus || []));
            elements.result.appendChild(createTipsSection(plan));
        }

        function createDay(day) {
            const article = document.createElement('article');
            article.className = 'day';

            const header = document.createElement('div');
            header.className = 'day-header';
            header.innerHTML = `<strong>${escapeHtml(day.day || '')}</strong><span>${escapeHtml(day.theme || '')}</span>`;
            article.appendChild(header);

            const mealList = document.createElement('div');
            mealList.className = 'meal-list';

            Object.keys(mealLabels).forEach((key) => {
                mealList.appendChild(createMeal(mealLabels[key], day.meals && day.meals[key]));
            });

            article.appendChild(mealList);
            return article;
        }

        function createMeal(label, meal = {}) {
            const section = document.createElement('section');
            section.className = 'meal';

            section.innerHTML = `
                <h3>${label}</h3>
                <div class="meal-name">${escapeHtml(meal.name || '未設定')}</div>
                <div class="meta">目安: ${escapeHtml(String(meal.cookingTimeMinutes || '-'))}分</div>
                <ul class="small-list">
                    <li>主な食材: ${escapeHtml(toText(meal.mainIngredients))}</li>
                    <li>追加食材: ${escapeHtml(toText(meal.additionalIngredients))}</li>
                </ul>
                <p class="meta">${escapeHtml(meal.steps || '')}</p>
            `;

            return section;
        }

        function createShoppingSection(list) {
            const section = document.createElement('section');
            section.className = 'result-section';
            section.innerHTML = '<h2>追加で買うもの</h2>';

            const grid = document.createElement('div');
            grid.className = 'shopping-grid';
            list.forEach((group) => {
                const card = document.createElement('div');
                card.className = 'mini-card';
                card.innerHTML = `<h3>${escapeHtml(group.category || 'その他')}</h3>`;

                const ul = document.createElement('ul');
                ul.className = 'small-list';
                (group.items || []).forEach((item) => {
                    const li = document.createElement('li');
                    li.textContent = `${item.name || ''} ${item.amount || ''} - ${item.purpose || ''}`.trim();
                    ul.appendChild(li);
                });

                card.appendChild(ul);
                grid.appendChild(card);
            });

            section.appendChild(grid);
            return section;
        }

        function createRecommendedSection(list) {
            const section = document.createElement('section');
            section.className = 'result-section';
            section.innerHTML = '<h2>保存候補</h2>';

            const grid = document.createElement('div');
            grid.className = 'save-grid';
            list.forEach((menu) => {
                const card = document.createElement('div');
                card.className = 'mini-card';
                card.innerHTML = `
                    <h3>${escapeHtml(menu.name || '')}</h3>
                    <p class="meta">${escapeHtml(menu.reason || '')}</p>
                `;

                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'save-menu-btn';
                button.textContent = '保存メニューに追加';
                button.addEventListener('click', () => addItem('savedMenus', menu.name));
                card.appendChild(button);
                grid.appendChild(card);
            });

            section.appendChild(grid);
            return section;
        }

        function createTipsSection(plan) {
            const section = document.createElement('section');
            section.className = 'result-section';
            section.innerHTML = '<h2>メモ</h2>';

            const card = document.createElement('div');
            card.className = 'mini-card';
            const ul = document.createElement('ul');
            ul.className = 'small-list';

            const avoidNote = plan.avoidanceCheck && plan.avoidanceCheck.note;
            [...(plan.tips || []), avoidNote].filter(Boolean).forEach((tip) => {
                const li = document.createElement('li');
                li.textContent = tip;
                ul.appendChild(li);
            });

            card.appendChild(ul);
            section.appendChild(card);
            return section;
        }

        function toText(value) {
            if (Array.isArray(value)) return value.join('、') || 'なし';
            return value || 'なし';
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#039;');
        }
    </script>
</body>
</html>
